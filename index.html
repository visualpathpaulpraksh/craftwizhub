<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CraftWizHub - Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;}
body{font-family:'Poppins',sans-serif;background:#0a0a0a;color:#fff;position:relative;}
.particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;}
.particle{position:absolute;width:4px;height:4px;background:rgba(79,70,229,0.6);border-radius:50%;animation:float-particle 20s infinite ease-in-out;}
@keyframes float-particle{0%,100%{transform:translate(0,0) scale(1);opacity:0.3;}50%{transform:translate(var(--tx),var(--ty)) scale(1.5);opacity:0.8;}}
.hero{position:relative;width:100%;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:60px 20px;z-index:2;}
.glow-orb{position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(79,70,229,0.4),transparent 70%);filter:blur(100px);animation:pulse 8s infinite ease-in-out;z-index:-1;}
.glow-orb.orb1{top:10%;left:10%;animation-delay:0s;}
.glow-orb.orb2{bottom:10%;right:10%;background:radial-gradient(circle,rgba(124,58,237,0.4),transparent 70%);animation-delay:2s;}
@keyframes pulse{0%,100%{transform:scale(1);opacity:0.5;}50%{transform:scale(1.2);opacity:0.8;}}
.coming-soon-container{text-align:center;max-width:900px;position:relative;}
.badge{display:inline-block;padding:8px 20px;background:rgba(79,70,229,0.2);border:1px solid rgba(79,70,229,0.5);border-radius:50px;font-size:14px;font-weight:600;letter-spacing:1px;margin-bottom:30px;animation:fadeInDown 1s ease;}
@keyframes fadeInDown{from{opacity:0;transform:translateY(-30px);}to{opacity:1;transform:translateY(0);}}
.main-title{font-size:7rem;font-weight:900;line-height:1.1;margin-bottom:30px;background:linear-gradient(135deg,#fff,#4f46e5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:fadeInUp 1s ease 0.2s both;}
@keyframes fadeInUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
.subtitle{font-size:1.5rem;font-weight:300;color:#999;margin-bottom:50px;animation:fadeInUp 1s ease 0.4s both;}
.countdown{display:flex;justify-content:center;gap:30px;margin-bottom:50px;animation:fadeInUp 1s ease 0.6s both;}
.countdown-item{background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);border:1px solid rgba(79,70,229,0.3);border-radius:20px;padding:30px 40px;min-width:120px;}
.countdown-number{font-size:3rem;font-weight:700;background:linear-gradient(135deg,#4f46e5,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:block;}
.countdown-label{font-size:0.9rem;color:#666;text-transform:uppercase;letter-spacing:1px;margin-top:10px;}
.notify-form{display:flex;gap:15px;justify-content:center;max-width:500px;margin:0 auto 40px;animation:fadeInUp 1s ease 0.8s both;}
.notify-input{flex:1;padding:18px 25px;background:rgba(255,255,255,0.05);border:1px solid rgba(79,70,229,0.3);border-radius:50px;color:#fff;font-size:16px;outline:none;transition:0.3s;}
.notify-input::placeholder{color:#666;}
.notify-input:focus{border-color:#4f46e5;background:rgba(255,255,255,0.08);}
.notify-btn{padding:18px 40px;background:linear-gradient(135deg,#4f46e5,#7c3aed);border:none;border-radius:50px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:0.3s;}
.notify-btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(79,70,229,0.5);}
.social-links{display:flex;gap:20px;justify-content:center;animation:fadeInUp 1s ease 1s both;}
.social-link{width:50px;height:50px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.05);border:1px solid rgba(79,70,229,0.3);border-radius:50%;color:#fff;text-decoration:none;font-size:20px;transition:0.3s;}
.social-link:hover{background:rgba(79,70,229,0.3);transform:translateY(-5px);}
.features{width:100%;padding:80px 20px;background:rgba(255,255,255,0.02);position:relative;z-index:2;}
.features-grid{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:30px;}
.feature-card{background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);border:1px solid rgba(79,70,229,0.2);border-radius:20px;padding:40px;text-align:center;transition:0.3s;opacity:0;transform:translateY(30px);}
.feature-card.show{opacity:1;transform:translateY(0);}
.feature-icon{width:80px;height:80px;margin:0 auto 20px;background:linear-gradient(135deg,#4f46e5,#7c3aed);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:2.5rem;}
.feature-card h3{font-size:1.5rem;margin-bottom:15px;color:#fff;}
.feature-card p{color:#999;line-height:1.6;}
.text-reveal-section{width:100%;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:80px 20px;background:#0a0a0a;position:relative;z-index:2;}
.text-container{width:100%;max-width:1200px;}
.text-line{display:flex;justify-content:center;align-items:center;gap:20px;flex-wrap:wrap;margin-bottom:10px;}
.text-word{font-family:'Bricolage Grotesque',sans-serif;font-size:7rem;font-weight:700;letter-spacing:-4px;color:#fff;display:inline-block;}
.img-reveal{height:110px;width:0;border-radius:10px;overflow:hidden;position:relative;}
.img-reveal img{height:100%;width:300px;position:absolute;left:50%;transform:translateX(-50%);border-radius:10px;object-fit:cover;}
@media(max-width:768px){
.hero{padding:40px 15px;}
.badge{font-size:12px;padding:6px 16px;margin-bottom:20px;}
.main-title{font-size:2.5rem;line-height:1.1;}
.subtitle{font-size:1rem;margin-bottom:30px;padding:0 10px;}
.countdown{flex-wrap:wrap;gap:10px;margin-bottom:30px;}
.countdown-item{padding:15px 20px;min-width:80px;}
.countdown-number{font-size:1.8rem;}
.countdown-label{font-size:0.75rem;}
.notify-form{flex-direction:column;padding:0 15px;gap:10px;}
.notify-input{padding:14px 20px;font-size:14px;}
.notify-btn{padding:14px 30px;font-size:14px;}
.social-links{gap:15px;}
.social-link{width:45px;height:45px;font-size:18px;}
.glow-orb{width:300px;height:300px;}
.text-reveal-section{padding:60px 15px;min-height:auto;}
.text-container{padding:0;}
.text-line{gap:10px;margin-bottom:15px;justify-content:flex-start;padding:0 10px;}
.text-word{font-size:2rem;letter-spacing:-1px;line-height:1.2;}
.img-reveal{height:45px;min-width:0;}
.img-reveal img{width:100px;}
}
</style>
</head>
<body>
<div class="particles" id="particles"></div>
<section class="hero">
<div class="glow-orb orb1"></div>
<div class="glow-orb orb2"></div>
<div class="coming-soon-container">
<div class="badge">LAUNCHING SOON</div>
<h1 class="main-title">Something<br>Amazing<br>Is Coming</h1>
<p class="subtitle">We're crafting an extraordinary experience. Stay tuned!</p>
<div class="countdown">
<div class="countdown-item">
<span class="countdown-number" id="days">00</span>
<span class="countdown-label">Days</span>
</div>
<div class="countdown-item">
<span class="countdown-number" id="hours">00</span>
<span class="countdown-label">Hours</span>
</div>
<div class="countdown-item">
<span class="countdown-number" id="minutes">00</span>
<span class="countdown-label">Minutes</span>
</div>
<div class="countdown-item">
<span class="countdown-number" id="seconds">00</span>
<span class="countdown-label">Seconds</span>
</div>
</div>
<form class="notify-form" id="notify">
<input type="email" class="notify-input" placeholder="Enter your email" required>
<button type="submit" class="notify-btn">Notify Me</button>
</form>
<div class="social-links">
<a href="#" class="social-link">𝕏</a>
<a href="#" class="social-link">in</a>
<a href="#" class="social-link">f</a>
<a href="#" class="social-link">ig</a>
</div>
</div>
</section>
<section class="text-reveal-section">
<div class="text-container">
<div class="text-line">
<span class="text-word">Crafting</span>
<span class="img-reveal">
<img src="https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=400" alt="">
</span>
<span class="text-word">digital</span>
</div>
<div class="text-line">
<span class="text-word">solutions</span>
<span class="img-reveal">
<img src="https://images.unsplash.com/photo-1556761175-5973dc0f32e7?w=400" alt="">
</span>
<span class="text-word">that</span>
</div>
<div class="text-line">
<span class="text-word">transform</span>
<span class="img-reveal">
<img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=400" alt="">
</span>
</div>
<div class="text-line">
<span class="text-word">businesses</span>
</div>
<div class="text-line">
<span class="text-word">and empower</span>
<span class="img-reveal">
<img src="https://images.unsplash.com/photo-1515879218367-8466d910aaa4?w=400" alt="">
</span>
<span class="text-word">innovation.</span>
</div>
</div>
</section>
<footer style="text-align:center;padding:30px 20px;background:#0a0a0a;color:#666;font-size:14px;border-top:1px solid rgba(79,70,229,0.2);">
<p>© 2026 CraftWizHub. All rights reserved.</p>
</footer>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://unpkg.com/lenis@1.1.19/dist/lenis.min.js"></script>
<script>
const particlesContainer = document.getElementById('particles');
for(let i = 0; i < 50; i++){
  const particle = document.createElement('div');
  particle.className = 'particle';
  particle.style.left = Math.random() * 100 + '%';
  particle.style.top = Math.random() * 100 + '%';
  particle.style.setProperty('--tx', (Math.random() - 0.5) * 200 + 'px');
  particle.style.setProperty('--ty', (Math.random() - 0.5) * 200 + 'px');
  particle.style.animationDelay = Math.random() * 20 + 's';
  particlesContainer.appendChild(particle);
}

const launchDate = new Date('2026-03-30T00:00:00').getTime();
function updateCountdown(){
  const now = new Date().getTime();
  const distance = launchDate - now;
  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((distance % (1000 * 60)) / 1000);
  document.getElementById('days').textContent = String(days).padStart(2, '0');
  document.getElementById('hours').textContent = String(hours).padStart(2, '0');
  document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
  document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
}
updateCountdown();
setInterval(updateCountdown, 1000);

document.querySelector('.notify-form').addEventListener('submit', (e) => {
  e.preventDefault();
  alert('Thank you! We will notify you when we launch.');
  e.target.reset();
});

gsap.from('.main-title', {
  scale: 0.8,
  opacity: 0,
  duration: 1,
  ease: 'power3.out'
});

const lenis = new Lenis();
lenis.on('scroll', ScrollTrigger.update);
gsap.ticker.add((time) => {
  lenis.raf(time * 1000);
});
gsap.ticker.lagSmoothing(0);

document.querySelectorAll('.text-line').forEach((line) => {
  const imgReveal = line.querySelector('.img-reveal');
  if (imgReveal) {
    const isMobile = window.innerWidth <= 768;
    gsap.to(imgReveal, {
      width: isMobile ? 100 : 300,
      ease: "none",
      scrollTrigger: {
        trigger: line,
        start: "top 90%",
        end: "top 40%",
        scrub: 1,
      }
    });
  }
});
</script>
</body>
</html>
